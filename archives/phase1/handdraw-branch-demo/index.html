<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Handdraw Branch Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: #1f2933;
        background: #f2f2ef;
      }

      main {
        width: min(1180px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 650;
      }

      .controls {
        display: flex;
        gap: 8px;
      }

      button {
        border: 1px solid #b9c0c8;
        border-radius: 6px;
        padding: 8px 12px;
        font: inherit;
        background: #fff;
        cursor: pointer;
      }

      button[aria-pressed="true"] {
        color: #fff;
        border-color: #243b53;
        background: #243b53;
      }

      .surface {
        overflow: hidden;
        border: 1px solid #d2d6dc;
        border-radius: 8px;
        background: #fffdf8;
        box-shadow: 0 10px 24px rgb(15 23 42 / 10%);
      }

      svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .baseline {
        opacity: 0.82;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .center {
        fill: #fff7ed;
        stroke: #d4a373;
        stroke-width: 3;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Handdraw Organic Branch Prototype</h1>
        <div class="controls" aria-label="Branch variant">
          <button type="button" data-mode="baseline">Baseline</button>
          <button type="button" data-mode="organic">Organic</button>
          <button type="button" data-mode="jittered">Jittered</button>
        </div>
      </header>
      <div class="surface">
        <svg id="demo" viewBox="0 0 1180 720" role="img" aria-label="Branch-only handdraw mind map demo"></svg>
      </div>
    </main>

    <script>
      const svg = document.querySelector("#demo");
      const buttons = [...document.querySelectorAll("button[data-mode]")];
      const NS = "http://www.w3.org/2000/svg";
      const center = { x: 590, y: 360 };

      const MAX_TERMINAL_SLOPE = Math.tan(Math.PI / 6);

      const semanticBranches = [
        {
          id: "branch-1",
          order: 0,
          leafCount: 3,
          color: "#e84d3c",
          seed: 11,
          children: [
            { id: "branch-1-a", leafCount: 1 },
            { id: "branch-1-b", leafCount: 1 },
            { id: "branch-1-c", leafCount: 1 },
          ],
        },
        {
          id: "branch-2",
          order: 1,
          leafCount: 5,
          color: "#1f8fe5",
          seed: 29,
          children: [
            { id: "branch-2-a", leafCount: 1 },
            { id: "branch-2-b", leafCount: 1 },
            { id: "branch-2-c", leafCount: 1 },
            { id: "branch-2-d", leafCount: 1 },
            { id: "branch-2-e", leafCount: 1 },
          ],
        },
        {
          id: "branch-3",
          order: 2,
          leafCount: 2,
          color: "#28b463",
          seed: 43,
          children: [
            { id: "branch-3-a", leafCount: 1 },
            { id: "branch-3-b", leafCount: 1 },
          ],
        },
      ];

      function createEl(name, attrs = {}) {
        const el = document.createElementNS(NS, name);
        for (const [key, value] of Object.entries(attrs)) {
          el.setAttribute(key, String(value));
        }
        return el;
      }

      function mulberry32(seed) {
        return function rand() {
          let t = (seed += 0x6d2b79f5);
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function smoothstep(t) {
        return t * t * (3 - 2 * t);
      }

      function cubicPoint(c, t) {
        const mt = 1 - t;
        return {
          x:
            mt * mt * mt * c.p0.x +
            3 * mt * mt * t * c.c1.x +
            3 * mt * t * t * c.c2.x +
            t * t * t * c.p3.x,
          y:
            mt * mt * mt * c.p0.y +
            3 * mt * mt * t * c.c1.y +
            3 * mt * t * t * c.c2.y +
            t * t * t * c.p3.y,
        };
      }

      function cubicTangent(c, t) {
        const mt = 1 - t;
        return {
          x:
            3 * mt * mt * (c.c1.x - c.p0.x) +
            6 * mt * t * (c.c2.x - c.c1.x) +
            3 * t * t * (c.p3.x - c.c2.x),
          y:
            3 * mt * mt * (c.c1.y - c.p0.y) +
            6 * mt * t * (c.c2.y - c.c1.y) +
            3 * t * t * (c.p3.y - c.c2.y),
        };
      }

      function normalize(v) {
        const len = Math.hypot(v.x, v.y) || 1;
        return { x: v.x / len, y: v.y / len };
      }

      function branchWeight(branch) {
        return (
          branch.leafCount +
          (branch.children?.length ?? 0) * 0.15 +
          (branch.children?.reduce((sum, child) => sum + child.leafCount, 0) ??
            0) *
            0.05
        );
      }

      function partitionBranches(branches) {
        const weights = branches.map(branchWeight);
        const total = weights.reduce((sum, weight) => sum + weight, 0);
        let best = null;
        const maxMask = 1 << branches.length;
        for (let mask = 1; mask < maxMask - 1; mask += 1) {
          const left = [];
          const right = [];
          let leftWeight = 0;
          for (let i = 0; i < branches.length; i += 1) {
            if (mask & (1 << i)) {
              left.push(branches[i]);
              leftWeight += weights[i];
            } else {
              right.push(branches[i]);
            }
          }
          const diff = Math.abs(total - leftWeight * 2);
          const countDiff = Math.abs(left.length - right.length);
          const firstOnLeft = left.includes(branches[0]) ? 0 : 1;
          const score = [diff, countDiff, firstOnLeft, mask];
          if (!best || compareScore(score, best.score) < 0) {
            best = { score, left, right };
          }
        }
        return {
          left: best.left.sort((a, b) => a.order - b.order),
          right: best.right.sort((a, b) => a.order - b.order),
        };
      }

      function compareScore(a, b) {
        for (let i = 0; i < a.length; i += 1) {
          if (a[i] !== b[i]) return a[i] - b[i];
        }
        return 0;
      }

      function laneOffsets(count) {
        if (count === 1) return [0];
        const step = Math.min(150, 300 / (count - 1));
        return Array.from(
          { length: count },
          (_, index) => (index - (count - 1) / 2) * step,
        );
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function branchCurve(start, spec) {
        const sideSign = spec.side === "right" ? 1 : -1;
        const terminalSlope = clamp(
          spec.terminalSlope ?? 0,
          -MAX_TERMINAL_SLOPE,
          MAX_TERMINAL_SLOPE,
        );
        const end = {
          x: start.x + sideSign * spec.length,
          y: start.y + (spec.yOffset ?? 0),
        };
        const growth = normalize({
          x: sideSign * 0.72,
          y: (spec.growthY ?? 0) * 0.85,
        });
        const reading = normalize({ x: sideSign, y: terminalSlope });
        return {
          p0: start,
          c1: {
            x: start.x + growth.x * spec.length * 0.36,
            y: start.y + growth.y * spec.length * 0.36,
          },
          c2: {
            x: end.x - reading.x * spec.length * 0.42,
            y: end.y - reading.y * spec.length * 0.42,
          },
          p3: end,
        };
      }

      function branchCurveTo(start, end, spec) {
        const sideSign = spec.side === "right" ? 1 : -1;
        const terminalSlope = clamp(
          spec.terminalSlope ?? 0,
          -MAX_TERMINAL_SLOPE,
          MAX_TERMINAL_SLOPE,
        );
        const distance = Math.abs(end.x - start.x);
        const vertical = end.y - start.y;
        const reading = normalize({ x: sideSign, y: terminalSlope });
        return {
          p0: start,
          c1: {
            x: start.x + sideSign * distance * 0.34,
            y: start.y + vertical * 0.18 + (spec.launchY ?? 0),
          },
          c2: {
            x: end.x - reading.x * distance * 0.48,
            y: end.y - reading.y * distance * 0.48,
          },
          p3: end,
        };
      }

      function siblingOffsets(count) {
        if (count === 1) return [0];
        if (count === 2) return [-1, 1];
        if (count === 3) return [-1, 0, 1];
        const step = 2 / (count - 1);
        return Array.from({ length: count }, (_, index) => -1 + index * step);
      }

      function childCurve(parentCurve, parentBranch, child, index, count) {
        const sideSign = parentBranch.side === "right" ? 1 : -1;
        const anchorT =
          count >= 4
            ? 0.34 + (index + 0.5) * (0.5 / count)
            : 0.56 + (index + 0.5) * (0.32 / count);
        const anchor = cubicPoint(parentCurve, anchorT);
        const tangent = normalize(cubicTangent(parentCurve, anchorT));
        const normal = { x: -tangent.y, y: tangent.x };
        const split = siblingOffsets(count)[index];
        if (count >= 4) {
          const rows = [170, 255, 345, 435, 520];
          const textStops = [1085, 1055, 1105, 1065, 1090];
          const rowIndex = Math.round(((split + 1) / 2) * (rows.length - 1));
          const targetY = rows[rowIndex];
          const endX =
            parentBranch.side === "right"
              ? textStops[rowIndex]
              : 1180 - textStops[rowIndex];
          return branchCurveTo(anchor, { x: endX, y: targetY }, {
            id: child.id,
            side: parentBranch.side,
            terminalSlope: clamp(split * 0.1, -0.26, 0.26),
            launchY: split * 18,
          });
        }
        const yOffset =
          normal.y * split * 126 +
          Math.sign(split) * 34 +
          parentBranch.laneOffset * 0.08;
        return branchCurve(anchor, {
          id: child.id,
          side: parentBranch.side,
          length: 150 + child.leafCount * 10,
          yOffset,
          terminalSlope: clamp(split * 0.18, -0.42, 0.42),
          growthY: split * 0.42,
        });
      }

      function buildSkeleton() {
        const partition = partitionBranches(semanticBranches);
        const skeleton = [];
        for (const side of ["left", "right"]) {
          const branches = partition[side];
          const offsets = laneOffsets(branches.length);
          branches.forEach((branch, sideIndex) => {
            const laneOffset = offsets[sideIndex];
            const mainCurve = branchCurve(center, {
              id: branch.id,
              side,
              length: 330 + branch.leafCount * 20,
              yOffset: branch.children.length >= 4 ? 42 : laneOffset,
              terminalSlope:
                branch.children.length >= 4
                  ? 0.08
                  : clamp(laneOffset / 640, -0.3, 0.3),
              growthY:
                branch.children.length >= 4 ? 0.34 : laneOffset / 210,
            });
            const main = {
              id: branch.id,
              semanticOrder: branch.order,
              side,
              laneOffset,
              depth: 1,
              color: branch.color,
              seed: branch.seed,
              curve: mainCurve,
              startWidth: 42,
              endWidth: 8,
              jitter: 7,
            };
            skeleton.push(main);
            branch.children.forEach((child, childIndex) => {
              skeleton.push({
                id: child.id,
                parentId: branch.id,
                semanticOrder: branch.order,
                side,
                depth: 2,
                color: branch.color,
                seed: branch.seed + 200 + childIndex * 17,
                curve: childCurve(
                  mainCurve,
                  main,
                  child,
                  childIndex,
                  branch.children.length,
                ),
                startWidth: 15,
                endWidth: 3.5,
                jitter: 4,
                opacity: 0.9,
              });
            });
          });
        }
        return skeleton;
      }

      const skeleton = buildSkeleton();

      function widthAt(t, startWidth, endWidth) {
        const decay = Math.pow(1 - smoothstep(t), 0.72);
        return endWidth + (startWidth - endWidth) * decay;
      }

      function ribbonPath(curve, opts) {
        const steps = opts.steps ?? 28;
        const randA = mulberry32(opts.seed);
        const randB = mulberry32(opts.seed + 101);
        const left = [];
        const right = [];
        for (let i = 0; i <= steps; i += 1) {
          const t = i / steps;
          const p = cubicPoint(curve, t);
          const tangent = normalize(cubicTangent(curve, t));
          const normal = { x: -tangent.y, y: tangent.x };
          const w = widthAt(t, opts.startWidth, opts.endWidth);
          const j = opts.jitter * (1 - t * 0.35);
          const leftJitter = (randA() - 0.5) * j;
          const rightJitter = (randB() - 0.5) * j;
          left.push({
            x: p.x + normal.x * (w / 2 + leftJitter),
            y: p.y + normal.y * (w / 2 + leftJitter),
          });
          right.push({
            x: p.x - normal.x * (w / 2 + rightJitter),
            y: p.y - normal.y * (w / 2 + rightJitter),
          });
        }
        const fmt = (p) => `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
        return [
          `M${fmt(left[0])}`,
          ...left.slice(1).map((p) => `L${fmt(p)}`),
          ...right.reverse().map((p) => `L${fmt(p)}`),
          "Z",
        ].join(" ");
      }

      function centerPath(curve) {
        const fmt = (p) => `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
        return `M${fmt(curve.p0)} C${fmt(curve.c1)} ${fmt(curve.c2)} ${fmt(curve.p3)}`;
      }

      function terminalAngleDegrees(curve) {
        const tangent = normalize(cubicTangent(curve, 1));
        return (Math.atan2(tangent.y, Math.abs(tangent.x)) * 180) / Math.PI;
      }

      window.__handdrawDemoDebug = {
        semanticOrder: semanticBranches.map((branch) => branch.id),
        sideWeights: {
          left: skeleton
            .filter((branch) => branch.depth === 1 && branch.side === "left")
            .reduce((sum, branch) => {
              const semantic = semanticBranches.find((item) => item.id === branch.id);
              return sum + branchWeight(semantic);
            }, 0),
          right: skeleton
            .filter((branch) => branch.depth === 1 && branch.side === "right")
            .reduce((sum, branch) => {
              const semantic = semanticBranches.find((item) => item.id === branch.id);
              return sum + branchWeight(semantic);
            }, 0),
        },
        skeleton: skeleton.map((branch) => ({
          id: branch.id,
          parentId: branch.parentId ?? null,
          semanticOrder: branch.semanticOrder,
          side: branch.side,
          depth: branch.depth,
          start: branch.curve.p0,
          end: branch.curve.p3,
          terminalAngle: terminalAngleDegrees(branch.curve),
        })),
      };

      function drawBranch(group, branch, mode) {
        const { curve } = branch;
        if (mode === "baseline") {
          group.append(
            createEl("path", {
              d: centerPath(curve),
              class: "baseline",
              stroke: branch.color,
              "stroke-width": branch.startWidth * 0.34,
              "data-branch-skeleton": branch.id,
              "data-depth": branch.depth,
            }),
          );
          return;
        }
        const path = createEl("path", {
          d: ribbonPath(curve, {
            startWidth: branch.startWidth,
            endWidth: branch.endWidth,
            jitter: mode === "jittered" ? branch.jitter : 0,
            seed: branch.seed,
          }),
          fill: branch.color,
          opacity: branch.opacity ?? 0.96,
          "data-branch-body": "true",
          "data-branch-skeleton": branch.id,
          "data-depth": branch.depth,
        });
        group.append(path);
      }

      function draw(mode) {
        svg.replaceChildren();
        const layer = createEl("g");
        const bodies = createEl("g");
        const centerLayer = createEl("g");
        svg.append(layer, bodies, centerLayer);

        for (const branch of skeleton) {
          drawBranch(bodies, branch, mode);
          if (branch.depth === 1) {
            const guide = createEl("path", {
              d: centerPath(branch.curve),
              fill: "none",
              stroke: "rgba(255,255,255,0.42)",
              "stroke-width": mode === "baseline" ? 0 : 1.5,
              "stroke-linecap": "round",
            });
            layer.append(guide);
          }
        }

        centerLayer.append(
          createEl("circle", {
            cx: center.x,
            cy: center.y,
            r: 47,
            class: "center",
          }),
          createEl("circle", {
            cx: center.x,
            cy: center.y,
            r: 17,
            fill: "#f59e0b",
          }),
        );
      }

      function setMode(mode) {
        for (const button of buttons) {
          button.setAttribute("aria-pressed", String(button.dataset.mode === mode));
        }
        draw(mode);
      }

      for (const button of buttons) {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      }

      setMode("jittered");
    </script>
  </body>
</html>
